<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Battle CP">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#060608"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Left board -->
  <g transform="translate(120,80)">
    <rect x="0" y="0" width="380" height="380" rx="6" ry="6" fill="#07070a" stroke="#222" stroke-width="2"/>
    <!-- grid -->
    <g stroke="#1f1f23" stroke-width="1">
      <!-- vertical lines -->
      <g>
        <line x1="40" y1="0" x2="40" y2="380"/>
        <line x1="80" y1="0" x2="80" y2="380"/>
        <line x1="120" y1="0" x2="120" y2="380"/>
        <line x1="160" y1="0" x2="160" y2="380"/>
        <line x1="200" y1="0" x2="200" y2="380"/>
        <line x1="240" y1="0" x2="240" y2="380"/>
        <line x1="280" y1="0" x2="280" y2="380"/>
        <line x1="320" y1="0" x2="320" y2="380"/>
      </g>
      <!-- horizontal lines -->
      <g>
        <line x1="0" y1="40" x2="380" y2="40"/>
        <line x1="0" y1="80" x2="380" y2="80"/>
        <line x1="0" y1="120" x2="380" y2="120"/>
        <line x1="0" y1="160" x2="380" y2="160"/>
        <line x1="0" y1="200" x2="380" y2="200"/>
        <line x1="0" y1="240" x2="380" y2="240"/>
        <line x1="0" y1="280" x2="380" y2="280"/>
        <line x1="0" y1="320" x2="380" y2="320"/>
      </g>
    </g>
    <!-- ship blocks -->
    <rect x="40" y="240" width="240" height="40" fill="#335" rx="4"/>
    <rect x="200" y="80" width="40" height="120" fill="#3a6" rx="4"/>
  </g>

  <!-- Right board (enemy) -->
  <g transform="translate(520,140)">
    <rect x="0" y="0" width="260" height="260" rx="6" ry="6" fill="#07070a" stroke="#222" stroke-width="2"/>
    <circle cx="80" cy="80" r="10" fill="#ef6c00"/>
    <circle cx="160" cy="160" r="10" fill="#ef6c00"/>
  </g>

  <!-- Title and subtitle -->
  <g transform="translate(120,490)">
    <text x="0" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="42" fill="#fff" font-weight="700">Battle CP</text>
    <text x="0" y="46" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" fill="#9aa0a6">Competitive programming meets realtime naval combat</text>
  </g>

  <!-- small badge -->
  <g transform="translate(980,20)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#0b0b0d" stroke="#2a2a2d"/>
    <text x="16" y="36" font-family="JetBrains Mono, monospace" font-size="16" fill="#2ee6a8">Play Now</text>
  </g>

</svg>
