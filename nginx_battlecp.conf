# Battle CP - Nginx Reverse Proxy for Oracle Cloud
# Place at: /etc/nginx/sites-available/battlecp
# Enable: sudo ln -s /etc/nginx/sites-available/battlecp /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx
#
# After getting TLS cert: sudo certbot --nginx -d your.domain.com
# Certbot will automatically update the SSL lines below.

upstream battlecp_backend {
    server 127.0.0.1:3000;
}

# HTTP -> HTTPS redirect (uncomment after running certbot)
# server {
#     listen 80;
#     server_name your.domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    # Listen on HTTP initially; Certbot will add HTTPS when you run it
    listen 80;
    # listen 443 ssl http2;  # uncomment after running certbot

    server_name _;  # Change to your domain: battlecp.yourdomain.com

    # TLS (uncomment after running certbot --nginx)
    # ssl_certificate /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # ---- Security Headers ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Max upload size ----
    client_max_body_size 1m;

    # ---- WebSocket connection upgrade (for game traffic) ----
    location /ws/ {
        proxy_pass http://battlecp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (10 min for idle connections)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # ---- API endpoints ----
    location /api/ {
        proxy_pass http://battlecp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Health check and root ----
    location / {
        proxy_pass http://battlecp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Gzip ----
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;
    gzip_proxied any;

    # ---- Rate limiting (prevents abuse) ----
    limit_req_zone $binary_remote_addr zone=battlecp_api:10m rate=30r/s;
    location /api/ {
        limit_req zone=battlecp_api burst=10 nodelay;
        proxy_pass http://battlecp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Deny access to hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
